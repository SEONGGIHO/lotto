<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>스마트 로또 보완균형 조합기 v11</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body{background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;padding-bottom:120px;-webkit-tap-highlight-color:transparent}
    .ball-1-10{background:radial-gradient(circle at 30% 30%,#fef08a,#eab308);color:#1e293b;text-shadow:0 1px 1px rgba(255,255,255,.5)}
    .ball-11-20{background:radial-gradient(circle at 30% 30%,#bfdbfe,#2563eb);color:#fff}
    .ball-21-30{background:radial-gradient(circle at 30% 30%,#fecaca,#dc2626);color:#fff}
    .ball-31-40{background:radial-gradient(circle at 30% 30%,#e2e8f0,#475569);color:#fff}
    .ball-41-45{background:radial-gradient(circle at 30% 30%,#bbf7d0,#16a34a);color:#fff}
    .lotto-ball{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:9999px;font-weight:900;font-size:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,.16),0 2px 4px -1px rgba(0,0,0,.1);animation:ballPop .35s cubic-bezier(.175,.885,.32,1.275) forwards;opacity:0;transform:scale(.35) rotate(-160deg)}
    @keyframes ballPop{to{opacity:1;transform:scale(1) rotate(0deg)}}
    .mini-ball{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:9999px;font-size:11px;font-weight:800;background:#eef2ff;color:#3730a3;margin:1px}
  </style>
</head>
<body class="bg-slate-50 text-slate-800 select-none">
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 px-4 sticky top-0 z-10 shadow-md">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-lg font-black tracking-tight flex items-center gap-2"><i class="fa-solid fa-dice-d20 text-yellow-300"></i>로또 보완균형 조합기</h1>
      <button onclick="resetAll()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full transition-all"><i class="fa-solid fa-rotate-left"></i> 초기화</button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 mt-4">
    <section class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">
      <div class="flex justify-between items-center mb-3 gap-2">
        <h3 class="text-sm font-bold text-slate-600 flex items-center gap-1.5"><i class="fa-solid fa-ticket text-indigo-500"></i> 자동 5게임 번호 입력</h3>
        <button onclick="openPasteModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-md shadow-emerald-100 active:scale-[0.97] transition-all">
          <i class="fa-solid fa-paste"></i> 복붙 입력
        </button>
      </div>
      <div class="bg-emerald-50 border border-emerald-200 text-emerald-800 text-[12px] leading-relaxed rounded-xl p-3 mb-3">
        <b>사용법:</b> Gemini/ChatGPT가 읽어준 자동 5게임 번호를 붙여넣으세요. 이 번호는 무조건 제외가 아니라 <b>이미 자동에서 사용된 번호</b>로 보고, 빠진 번호를 보완합니다.
      </div>
      <div class="grid grid-cols-6 gap-2" id="inputGrid"></div>
      <div class="flex justify-between items-center mt-3">
        <p class="text-[11px] text-slate-400">* 틀린 칸은 직접 수정 가능합니다.</p>
        <button onclick="clearInputsOnly()" class="text-[11px] font-bold text-indigo-600 hover:underline">입력창만 비우기</button>
      </div>
    </section>

    <section id="inputSummary" class="hidden bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4"></section>

    <div class="text-center my-4 space-y-2">
      <button onclick="generateBalancedComplement()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-3.5 px-6 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 active:scale-[0.97] transition-all flex items-center justify-center gap-2">
        <i class="fa-solid fa-wand-magic-sparkles"></i> 보완균형조합 생성하기
      </button>
      <button id="captureBtn" onclick="saveCaptureImage()" class="hidden w-full bg-slate-900 hover:bg-slate-800 text-white py-3 px-6 rounded-2xl font-bold text-sm shadow-lg active:scale-[0.97] transition-all flex items-center justify-center gap-2">
        <i class="fa-solid fa-camera-retro"></i> 자동+보완 한장 캡처 저장
      </button>
    </div>

    <div id="resultBox" class="space-y-3">
      <div id="emptyState" class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200">
        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fa-solid fa-dice text-slate-300 text-3xl"></i></div>
        <p class="text-sm text-slate-400 font-medium">자동 5게임 번호를 붙여넣고<br>보완균형조합을 생성하세요.</p>
      </div>
    </div>
  </main>

  <script>
    if ('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

    let lastGeneratedRows=null;
    let lastGeneratedMeta=null;

    const grid=document.getElementById('inputGrid');
    for(let i=0;i<30;i++){
      const input=document.createElement('input');
      input.type='number'; input.inputMode='numeric'; input.min=1; input.max=45; input.placeholder='-';
      input.className='w-full text-center py-2.5 font-bold text-slate-700 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all';
      input.addEventListener('input', updateInputSummary);
      grid.appendChild(input);
    }

    function getBallColorClass(n){if(n<=10)return'ball-1-10';if(n<=20)return'ball-11-20';if(n<=30)return'ball-21-30';if(n<=40)return'ball-31-40';return'ball-41-45'}
    function pad2(n){return String(n).padStart(2,'0')}
    function randInt(max){return Math.floor(Math.random()*max)}
    function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=randInt(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
    function uniq(arr){return [...new Set(arr)]}

    function getInputs(){
      return [...document.querySelectorAll('#inputGrid input')].map(i=>parseInt(i.value,10)).filter(n=>Number.isInteger(n)&&n>=1&&n<=45);
    }
    function getInputRows(){
      const vals=[...document.querySelectorAll('#inputGrid input')].map(i=>parseInt(i.value,10));
      const rows=[];
      for(let r=0;r<5;r++) rows.push(vals.slice(r*6,r*6+6).filter(n=>Number.isInteger(n)&&n>=1&&n<=45));
      return rows;
    }
    function getFreq(nums){const f=Array(46).fill(0); nums.forEach(n=>{if(n>=1&&n<=45) f[n]++}); return f;}
    function clearInputsOnly(){document.querySelectorAll('#inputGrid input').forEach(i=>{i.value='';i.classList.remove('border-green-500','bg-green-50')});updateInputSummary();showCustomToast('입력 슬롯이 초기화되었습니다.')}
    function resetAll(){clearInputsOnly();lastGeneratedRows=null;lastGeneratedMeta=null;document.getElementById('captureBtn')?.classList.add('hidden');document.getElementById('resultBox').innerHTML=`<div id="emptyState" class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fa-solid fa-dice text-slate-300 text-3xl"></i></div><p class="text-sm text-slate-400 font-medium">자동 5게임 번호를 붙여넣고<br>보완균형조합을 생성하세요.</p></div>`}

    function openPasteModal(){
      const modal=document.createElement('div');
      modal.className='fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-5 z-50';
      modal.innerHTML=`
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl">
          <h3 class="font-bold text-lg text-slate-900 mb-2 text-center">자동번호 복붙 입력</h3>
          <p class="text-[12px] text-slate-500 leading-relaxed mb-3">A~E 줄 형식, 숫자 30개 한 줄 형식 모두 가능합니다. 줄 앞에 'A 수동', '1게임' 같은 글자가 있어도 각 줄의 <b>마지막 6개 번호</b>를 우선 읽습니다.</p>
          <textarea id="pasteArea" class="w-full h-40 bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" placeholder="A 수동 09 15 24 33 39 41\nB 수동 02 11 25 31 33 41\n..."></textarea>
          <div class="grid grid-cols-2 gap-2 mt-3">
            <button onclick="this.closest('.fixed').remove()" class="py-2.5 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm">취소</button>
            <button onclick="applyPastedNumbers()" class="py-2.5 rounded-xl bg-emerald-600 text-white font-bold text-sm">입력 적용</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      setTimeout(()=>document.getElementById('pasteArea')?.focus(),100);
    }

    function extractLottoTokens(text){
      const out=[];
      const re=/(^|[^0-9])(0?[1-9]|[1-3][0-9]|4[0-5])(?=$|[^0-9])/g;
      let m; while((m=re.exec(text))!==null) out.push(parseInt(m[2],10));
      return out;
    }
    function parsePastedNumbers(text){
      const lines=text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
      const rowNumbers=[];
      for(const line of lines){
        const nums=extractLottoTokens(line);
        if(nums.length>=6) rowNumbers.push(nums.slice(-6));
      }
      if(rowNumbers.length>=5) return rowNumbers.slice(0,5).flat();
      const all=extractLottoTokens(text);
      if(all.length>=30) return all.slice(0,30);
      return all;
    }
    function applyPastedNumbers(){
      const area=document.getElementById('pasteArea');
      const nums=parsePastedNumbers(area.value||'');
      if(nums.length<30){showCustomModal('번호 부족',`인식된 로또번호가 ${nums.length}개입니다. 자동 5게임 기준 30개가 필요합니다.`);return;}
      const inputs=document.querySelectorAll('#inputGrid input');
      inputs.forEach((input,i)=>{input.value=nums[i]||'';input.classList.add('border-green-500','bg-green-50')});
      document.querySelector('.fixed')?.remove();
      updateInputSummary();
      showCustomToast('자동번호 30개를 입력했습니다.');
    }

    function updateInputSummary(){
      const box=document.getElementById('inputSummary');
      const nums=getInputs();
      if(nums.length===0){box.classList.add('hidden');box.innerHTML='';return;}
      const unique=uniq(nums);
      const missing=[]; for(let n=1;n<=45;n++) if(!unique.includes(n)) missing.push(n);
      const coverPossible=missing.length<=30;
      box.classList.remove('hidden');
      box.innerHTML=`
        <h4 class="font-black text-sm text-slate-700 mb-2 flex items-center gap-1.5"><i class="fa-solid fa-chart-pie text-indigo-500"></i> 입력 분석</h4>
        <div class="grid grid-cols-3 gap-2 text-center mb-3">
          <div class="bg-slate-50 rounded-xl p-2"><div class="text-[11px] text-slate-400">입력칸</div><div class="font-black text-slate-700">${nums.length}/30</div></div>
          <div class="bg-slate-50 rounded-xl p-2"><div class="text-[11px] text-slate-400">고유번호</div><div class="font-black text-slate-700">${unique.length}개</div></div>
          <div class="${coverPossible?'bg-emerald-50':'bg-amber-50'} rounded-xl p-2"><div class="text-[11px] ${coverPossible?'text-emerald-500':'text-amber-500'}">전체커버</div><div class="font-black ${coverPossible?'text-emerald-700':'text-amber-700'}">${coverPossible?'가능':'일부'}</div></div>
        </div>
        <div class="text-[12px] leading-relaxed text-slate-500"><b>자동에서 빠진 번호 ${missing.length}개:</b><br>${missing.map(n=>`<span class="mini-ball">${pad2(n)}</span>`).join('')}</div>`;
    }

    function weightedSampleWithoutReplacement(pool, count, weightFn){
      const arr=[...pool], picked=[];
      while(picked.length<count && arr.length){
        const weights=arr.map(weightFn); const total=weights.reduce((a,b)=>a+b,0);
        let r=Math.random()*total, idx=0;
        for(;idx<arr.length;idx++){r-=weights[idx]; if(r<=0) break;}
        picked.push(arr.splice(Math.min(idx,arr.length-1),1)[0]);
      }
      return picked;
    }

    function consecutiveInfo(row){
      const a=[...row].sort((x,y)=>x-y);
      let longest=1, cur=1, pairCount=0;
      for(let i=1;i<a.length;i++){
        if(a[i]===a[i-1]+1){
          pairCount++;
          cur++;
          longest=Math.max(longest,cur);
        }else{
          cur=1;
        }
      }
      return {longest, pairCount};
    }
    function rowAnalysis(row){
      const odd=row.filter(n=>n%2).length, even=6-odd;
      const sum=row.reduce((a,b)=>a+b,0);
      const zones=[row.filter(n=>n<=15).length,row.filter(n=>n>=16&&n<=30).length,row.filter(n=>n>=31).length];
      const seq=consecutiveInfo(row);
      return {odd,even,sum,zones,run:seq.longest,pairs:seq.pairCount};
    }
    function scoreRow(row){
      const a=rowAnalysis(row); let score=100;
      // V10: 2연속은 자연스럽게 허용하고, 3연속 이상만 강하게 감점합니다.
      if(a.run===2) score+=2; else if(a.run===3) score-=28; else if(a.run>=4) score-=85;
      // 한 줄 안에 2연속 쌍이 2개 이상이면 조금만 감점합니다. 예: 11-12와 33-34가 같이 있는 경우.
      if(a.pairs>=2 && a.run<3) score-=4*(a.pairs-1);
      const oddDiff=Math.abs(a.odd-a.even); if(oddDiff===4) score-=12; else if(oddDiff===6) score-=35;
      const zeroZones=a.zones.filter(v=>v===0).length; score-=zeroZones*18;
      const maxZone=Math.max(...a.zones); if(maxZone>=5) score-=20; else if(maxZone===4) score-=8;
      score-=Math.min(35, Math.abs(a.sum-138)*0.45);
      const endCount={}; row.forEach(n=>{const e=n%10;endCount[e]=(endCount[e]||0)+1});
      const maxEnd=Math.max(...Object.values(endCount)); if(maxEnd>=3) score-=12;
      return score;
    }
    function overlapCount(a,b){const s=new Set(a); return b.filter(n=>s.has(n)).length;}
    function scoreCandidate(rows, autoRows, requiredMissing){
      let score=0; rows.forEach(r=>score+=scoreRow(r));
      const flat=rows.flat(); const set=new Set(flat);
      // 보완 대상 번호가 빠지면 강한 감점
      requiredMissing.forEach(n=>{if(!set.has(n)) score-=200});
      // 자동 각 줄과 너무 비슷하면 감점
      for(const r of rows){ for(const ar of autoRows){ const ov=overlapCount(r,ar); if(ov>=4) score-=45; else if(ov===3) score-=14; }}
      // 보완 줄끼리 너무 비슷한 경우. 현재는 전체 30개를 유니크로 구성하므로 거의 0이지만 안전장치.
      for(let i=0;i<rows.length;i++) for(let j=i+1;j<rows.length;j++){const ov=overlapCount(rows[i],rows[j]); if(ov>=3) score-=30;}
      // 전체 구간 분포
      const zones=[flat.filter(n=>n<=15).length,flat.filter(n=>n>=16&&n<=30).length,flat.filter(n=>n>=31).length];
      score-=Math.max(...zones)-Math.min(...zones);
      // V10: 보완 5게임 전체에서 2연속이 너무 없으면 인위적으로 보여 약간 감점,
      // 1~3쌍 정도는 자연스럽게 허용합니다. 다만 과하면 감점합니다.
      const totalPairs=rows.reduce((sum,r)=>sum+rowAnalysis(r).pairs,0);
      const tripleRows=rows.filter(r=>rowAnalysis(r).run>=3).length;
      if(totalPairs===0) score-=18;
      else if(totalPairs>=1 && totalPairs<=3) score+=10;
      else if(totalPairs>=5) score-=12*(totalPairs-4);
      score-=tripleRows*20;
      return score;
    }
    function buildCandidate(freq, autoRows){
      const uniqueAuto=[]; for(let n=1;n<=45;n++) if(freq[n]>0) uniqueAuto.push(n);
      const missing=[]; for(let n=1;n<=45;n++) if(freq[n]===0) missing.push(n);
      let requiredMissing=[...missing];
      let chosen=[];
      if(missing.length>30){
        chosen=shuffle(missing).slice(0,30);
        requiredMissing=[...chosen];
      }else{
        chosen=[...missing];
        const fillNeed=30-chosen.length;
        if(fillNeed>0){
          const reusePool=[]; for(let n=1;n<=45;n++) if(!chosen.includes(n)) reusePool.push(n);
          const fillers=weightedSampleWithoutReplacement(reusePool, fillNeed, n=>1/Math.pow(freq[n]+0.65,2));
          chosen=chosen.concat(fillers);
        }
      }
      let bestRows=null, bestScore=-Infinity;
      // 같은 30개라도 줄 배치에 따라 점수가 크게 달라서 후보 안에서 여러 번 섞음
      for(let t=0;t<3;t++){
        const arr=shuffle(chosen);
        const rows=[];
        for(let r=0;r<5;r++) rows.push(arr.slice(r*6,r*6+6).sort((a,b)=>a-b));
        const sc=scoreCandidate(rows, autoRows, requiredMissing);
        if(sc>bestScore){bestScore=sc; bestRows=rows;}
      }
      return {rows:bestRows, score:bestScore, requiredMissing};
    }

    function generateBalancedComplement(){
      const nums=getInputs();
      if(nums.length<6){showCustomModal('입력 필요','자동 5게임 번호를 먼저 붙여넣어 주세요. 최소 6개 이상 입력되어야 조합을 만들 수 있습니다.');return;}
      const freq=getFreq(nums), autoRows=getInputRows();
      const missing=[]; for(let n=1;n<=45;n++) if(freq[n]===0) missing.push(n);
      let best=null;
      const iterations=3500;
      for(let i=0;i<iterations;i++){
        const cand=buildCandidate(freq, autoRows);
        if(!best || cand.score>best.score) best=cand;
      }
      renderResults(best.rows, nums, freq, missing, best.requiredMissing);
    }

    function renderResults(rows, inputNums, freq, originalMissing, requiredMissing){
      const resultBox=document.getElementById('resultBox'); resultBox.innerHTML='';
      const manualFlat=rows.flat();
      const autoUnique=uniq(inputNums);
      const totalCover=new Set([...autoUnique,...manualFlat]);
      const stillMissing=[]; for(let n=1;n<=45;n++) if(!totalCover.has(n)) stillMissing.push(n);
      const reused=manualFlat.filter(n=>freq[n]>0);
      const impossible=originalMissing.length>30;
      lastGeneratedRows=rows.map(r=>[...r]);
      lastGeneratedMeta={inputRows:getInputRows(), inputNums:[...inputNums], totalCoverSize:totalCover.size, stillMissing:[...stillMissing], originalMissing:[...originalMissing], reused:[...reused]};
      document.getElementById('captureBtn')?.classList.remove('hidden');
      const summary=document.createElement('div');
      summary.className='bg-white rounded-2xl p-4 shadow-sm border border-slate-100';
      summary.innerHTML=`
        <div class="flex items-center justify-between mb-3">
          <h4 class="font-black text-slate-800 flex items-center gap-1.5"><i class="fa-solid fa-circle-check text-emerald-500"></i> 보완 결과</h4>
          <span class="text-[11px] font-bold px-2 py-1 rounded-full ${stillMissing.length===0?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">전체커버 ${totalCover.size}/45</span>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center mb-3">
          <div class="bg-slate-50 rounded-xl p-2"><div class="text-[11px] text-slate-400">자동 고유</div><div class="font-black">${autoUnique.length}</div></div>
          <div class="bg-slate-50 rounded-xl p-2"><div class="text-[11px] text-slate-400">자동 미출현</div><div class="font-black">${originalMissing.length}</div></div>
          <div class="bg-slate-50 rounded-xl p-2"><div class="text-[11px] text-slate-400">재사용</div><div class="font-black">${reused.length}</div></div>
        </div>
        <p class="text-[12px] text-slate-500 leading-relaxed">
          ${impossible?'자동번호 중복이 많아 빠진 번호가 30개를 초과했습니다. 보완 5게임 안에 가능한 만큼 우선 반영했습니다.':'자동에서 빠진 번호를 보완 5게임에 우선 반영했습니다.'}
          ${stillMissing.length===0?'<b class="text-emerald-700">자동+보완 10게임 안에 1~45 전체 번호가 포함됩니다.</b>':`<b class="text-amber-700">아직 미포함 번호: ${stillMissing.map(pad2).join(', ')}</b>`}
        </p>`;
      resultBox.appendChild(summary);

      const letters=['A','B','C','D','E'];
      rows.forEach((group,g)=>{
        const div=document.createElement('div');
        div.className='bg-white p-3 rounded-2xl shadow-sm border border-slate-100';
        const analysis=rowAnalysis(group);
        const runText=analysis.run>=3?`연속 ${analysis.pairs}쌍 · ${analysis.run}연속 주의`:`연속 ${analysis.pairs}쌍`;
        div.innerHTML=`
          <div class="flex items-center justify-between gap-2">
            <span class="text-sm font-black text-slate-400 bg-slate-50 w-7 h-7 rounded-lg flex items-center justify-center border border-slate-100">${letters[g]}</span>
            <div class="flex gap-1.5 flex-wrap justify-end">${group.map((n,i)=>`<span class="lotto-ball ${getBallColorClass(n)}" style="animation-delay:${i*0.06}s">${pad2(n)}</span>`).join('')}</div>
          </div>
          <div class="mt-3 text-[11px] text-slate-500 bg-slate-50 rounded-xl px-3 py-2">
            홀짝 ${analysis.odd}:${analysis.even} · 합계 ${analysis.sum} · 구간 ${analysis.zones.join('-')} · ${runText}
          </div>`;
        resultBox.appendChild(div);
      });
    }


    function colorForNumber(n){
      if(n<=10)return{bg:'#eab308',fg:'#1e293b'};
      if(n<=20)return{bg:'#2563eb',fg:'#ffffff'};
      if(n<=30)return{bg:'#dc2626',fg:'#ffffff'};
      if(n<=40)return{bg:'#475569',fg:'#ffffff'};
      return{bg:'#16a34a',fg:'#ffffff'};
    }
    function ballHtml(n,size=38){
      const c=colorForNumber(n);
      return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;border-radius:9999px;background:${c.bg};color:${c.fg};font-weight:900;font-size:${Math.round(size*0.42)}px;margin:3px;box-shadow:0 2px 5px rgba(0,0,0,.18)">${pad2(n)}</span>`;
    }
    function plainRowHtml(label,row,kind){
      const a=rowAnalysis(row);
      const meta=kind==='auto'?'자동 입력':'보완 생성';
      return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid #e2e8f0;border-radius:16px;padding:12px;margin-top:8px;background:#ffffff">
        <div style="width:58px;flex-shrink:0;text-align:center">
          <div style="font-size:20px;font-weight:900;color:#334155">${label}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${meta}</div>
        </div>
        <div style="flex:1;text-align:right;white-space:nowrap">${row.map(n=>ballHtml(n,38)).join('')}</div>
        <div style="width:145px;flex-shrink:0;font-size:11px;color:#475569;line-height:1.55;background:#f8fafc;border-radius:12px;padding:8px">
          홀짝 ${a.odd}:${a.even}<br>합계 ${a.sum}<br>구간 ${a.zones.join('-')} · 연속 ${a.pairs}쌍
        </div>
      </div>`;
    }
    function buildCaptureCard(){
      if(!lastGeneratedRows){showCustomModal('캡처 불가','먼저 보완균형조합을 생성해 주세요.');return null;}
      const letters=['A','B','C','D','E'];
      const now=new Date();
      const dateText=now.toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const autoRows=lastGeneratedMeta.inputRows;
      const compRows=lastGeneratedRows;
      const missingText=lastGeneratedMeta.stillMissing.length?lastGeneratedMeta.stillMissing.map(pad2).join(', '):'없음';
      const card=document.createElement('div');
      card.id='captureCard';
      card.style.cssText='position:fixed;left:-99999px;top:0;width:860px;background:#f3f4f6;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:28px;z-index:-1;';
      card.innerHTML=`
        <div style="background:linear-gradient(135deg,#4f46e5,#9333ea);color:white;border-radius:24px;padding:22px 24px;box-shadow:0 8px 20px rgba(79,70,229,.24)">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:14px">
            <div>
              <div style="font-size:28px;font-weight:900;letter-spacing:-.5px">로또 보완균형 조합 기록</div>
              <div style="font-size:13px;opacity:.86;margin-top:4px">자동 5게임 + 보완 5게임 / ${dateText}</div>
            </div>
            <div style="text-align:right;background:rgba(255,255,255,.16);border-radius:16px;padding:10px 14px">
              <div style="font-size:12px;opacity:.85">전체 커버</div>
              <div style="font-size:24px;font-weight:900">${lastGeneratedMeta.totalCoverSize}/45</div>
            </div>
          </div>
        </div>
        <div style="background:#ffffff;border-radius:22px;padding:20px;margin-top:16px;box-shadow:0 4px 14px rgba(15,23,42,.08);border:1px solid #e2e8f0">
          <div style="font-size:18px;font-weight:900;margin-bottom:10px;color:#1e293b">① 자동 5게임 입력번호</div>
          ${autoRows.map((r,i)=>plainRowHtml(letters[i],r,'auto')).join('')}
        </div>
        <div style="background:#ffffff;border-radius:22px;padding:20px;margin-top:16px;box-shadow:0 4px 14px rgba(15,23,42,.08);border:1px solid #e2e8f0">
          <div style="font-size:18px;font-weight:900;margin-bottom:10px;color:#1e293b">② 보완균형 생성번호</div>
          ${compRows.map((r,i)=>plainRowHtml(letters[i],r,'comp')).join('')}
        </div>
        <div style="background:#ffffff;border-radius:22px;padding:18px 20px;margin-top:16px;box-shadow:0 4px 14px rgba(15,23,42,.08);border:1px solid #e2e8f0">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center">
            <div style="background:#f8fafc;border-radius:14px;padding:12px"><div style="font-size:12px;color:#64748b">자동 고유</div><div style="font-size:22px;font-weight:900">${uniq(lastGeneratedMeta.inputNums).length}</div></div>
            <div style="background:#f8fafc;border-radius:14px;padding:12px"><div style="font-size:12px;color:#64748b">자동 미출현</div><div style="font-size:22px;font-weight:900">${lastGeneratedMeta.originalMissing.length}</div></div>
            <div style="background:#f8fafc;border-radius:14px;padding:12px"><div style="font-size:12px;color:#64748b">보완 재사용</div><div style="font-size:22px;font-weight:900">${lastGeneratedMeta.reused.length}</div></div>
            <div style="background:${lastGeneratedMeta.stillMissing.length?'#fef3c7':'#dcfce7'};border-radius:14px;padding:12px"><div style="font-size:12px;color:${lastGeneratedMeta.stillMissing.length?'#92400e':'#166534'}">미포함</div><div style="font-size:22px;font-weight:900;color:${lastGeneratedMeta.stillMissing.length?'#92400e':'#166534'}">${lastGeneratedMeta.stillMissing.length}</div></div>
          </div>
          <div style="font-size:12px;color:#64748b;line-height:1.6;margin-top:12px">미포함 번호: ${missingText}</div>
        </div>
      `;
      document.body.appendChild(card);
      return card;
    }
    async function saveCaptureImage(){
      if(!window.html2canvas){showCustomModal('캡처 모듈 로딩 필요','캡처 기능이 아직 로딩되지 않았습니다. 인터넷 연결 상태에서 잠시 후 다시 눌러주세요.');return;}
      const card=buildCaptureCard();
      if(!card) return;
      const overlay=document.createElement('div');
      overlay.className='fixed inset-0 bg-slate-900/75 z-50 flex items-center justify-center text-white text-sm font-bold';
      overlay.innerHTML='<div class="bg-white text-slate-800 rounded-2xl p-5 shadow-2xl text-center"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent mx-auto mb-3"></div>한장 이미지 만드는 중...</div>';
      document.body.appendChild(overlay);
      try{
        const canvas=await html2canvas(card,{backgroundColor:'#f3f4f6',scale:2,useCORS:true,logging:false});
        const filename='lotto_balance_'+new Date().toISOString().slice(0,16).replace(/[-:T]/g,'')+'.png';
        const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png',0.98));
        if(navigator.canShare && navigator.canShare({files:[new File([blob],filename,{type:'image/png'})]})){
          const file=new File([blob],filename,{type:'image/png'});
          await navigator.share({files:[file],title:'로또 보완균형 조합 기록'});
        }else{
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
          setTimeout(()=>URL.revokeObjectURL(url),2000);
          showCustomToast('캡처 이미지 저장을 시작했습니다.');
        }
      }catch(err){
        console.error(err);
        showCustomModal('캡처 실패','이미지 생성 중 오류가 발생했습니다. 다시 시도해 주세요.');
      }finally{
        overlay.remove();
        card.remove();
      }
    }

    function showCustomModal(title, html){
      const modal=document.createElement('div');
      modal.className='fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-6 z-50';
      modal.innerHTML=`<div class="bg-white rounded-2xl max-w-sm w-full p-5 text-center shadow-2xl"><h3 class="font-bold text-lg text-slate-900 mb-2">${title}</h3><div class="text-xs text-slate-500 leading-relaxed mb-4 text-left">${html}</div><button onclick="this.closest('.fixed').remove()" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl hover:bg-indigo-700 transition-all">확인</button></div>`;
      document.body.appendChild(modal);
    }
    function showCustomToast(message){
      const toast=document.createElement('div');
      toast.className='fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white text-[12px] font-semibold px-4 py-3 rounded-full shadow-lg z-50 flex items-center gap-1.5';
      toast.innerHTML=`<i class="fa-solid fa-circle-check text-green-400"></i> ${message}`;
      document.body.appendChild(toast); setTimeout(()=>toast.remove(),2500);
    }
    updateInputSummary();
  </script>
</body>
</html>
