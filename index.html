<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  
  <title>스마트 로또 조합기 PRO</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding-bottom: 120px;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* 입체감 있는 실제 로또 공 색상 스타일링 */
    .ball-1-10 { background: radial-gradient(circle at 30% 30%, #fef08a, #eab308); color: #1e293b; text-shadow: 0 1px 1px rgba(255,255,255,0.5); }
    .ball-11-20 { background: radial-gradient(circle at 30% 30%, #bfdbfe, #2563eb); color: #ffffff; }
    .ball-21-30 { background: radial-gradient(circle at 30% 30%, #fecaca, #dc2626); color: #ffffff; }
    .ball-31-40 { background: radial-gradient(circle at 30% 30%, #e2e8f0, #475569); color: #ffffff; }
    .ball-41-45 { background: radial-gradient(circle at 30% 30%, #bbf7d0, #16a34a); color: #ffffff; }

    /* 탄력 있는 공 팝업 애니메이션 */
    .lotto-ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-weight: 800;
      font-size: 17px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
      animation: ballPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: scale(0.3) rotate(-180deg);
    }
    @keyframes ballPop {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 select-none">

  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 px-4 sticky top-0 z-10 shadow-md safe-top">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-lg font-black tracking-tight flex items-center gap-2">
        <i class="fa-solid fa-dice-d20 text-yellow-300"></i>
        스마트 로또 조합기 PRO
      </h1>
      <button onclick="resetAll()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full transition-all">
        <i class="fa-solid fa-rotate-left"></i> 전체 초기화
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 mt-4">

    <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-sm font-bold text-slate-500 flex items-center gap-1.5">
          <i class="fa-solid fa-ban text-red-500"></i> 제외할 번호 입력 (6열 5행)
        </h3>
        
        <label for="cameraInput" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 cursor-pointer transition-all shadow-md shadow-indigo-100">
          <i class="fa-solid fa-camera"></i> 사진 찍어 자동 입력
        </label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="processOcrWithFilter(this)">
      </div>

      <div class="grid grid-cols-6 gap-2" id="inputGrid"></div>
      
      <div class="flex justify-between items-center mt-3">
        <p class="text-[11px] text-slate-400">
          * 직접 기입하거나 우측 상단 <b>카메라 버튼</b>을 이용하세요.
        </p>
        <button onclick="clearInputsOnly()" class="text-[11px] font-bold text-indigo-600 hover:underline">
          입력창만 비우기
        </button>
      </div>
    </div>

    <div class="text-center my-4">
      <button onclick="generateLotto()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-3.5 px-6 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 active:scale-[0.97] transition-all flex items-center justify-center gap-2">
        <i class="fa-solid fa-wand-magic-sparkles"></i> 대박 기원 조합 생성하기
      </button>
    </div>

    <div id="resultBox" class="space-y-3">
      <div id="emptyState" class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200">
        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fa-solid fa-dice text-slate-300 text-3xl"></i>
        </div>
        <p class="text-sm text-slate-400 font-medium">제외할 번호를 지정한 뒤<br>'조합 생성하기' 버튼을 눌러주세요!</p>
      </div>
    </div>

  </main>

  <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-xs z-50 flex flex-col items-center justify-center text-white px-6 text-center">
    <div class="bg-white text-slate-800 p-6 rounded-3xl shadow-2xl max-w-xs w-full flex flex-col items-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
      <h4 class="font-bold text-lg text-slate-900 mb-1" id="loadingTitle">사진 분석 중...</h4>
      <p class="text-xs text-slate-500 mb-4 leading-relaxed" id="ocrProgress">고화질 필터 보정 및 인식 가동 중입니다.</p>
      <div class="w-full bg-slate-100 rounded-full h-2">
        <div id="ocrProgressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
      </div>
    </div>
  </div>

  <canvas id="hiddenCanvas" class="hidden"></canvas>

  <script>
    const grid = document.getElementById("inputGrid");
    
    // 6x5 인풋 격자 엔진 빌드
    for (let i = 0; i < 30; i++) {
      const input = document.createElement("input");
      input.type = "number";
      input.inputMode = "numeric";
      input.min = 1;
      input.max = 45;
      input.placeholder = "-";
      input.className = "w-full text-center py-2.5 font-bold text-slate-700 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all";
      grid.appendChild(input);
    }

    function getBallColorClass(number) {
      if (number <= 10) return "ball-1-10";
      if (number <= 20) return "ball-11-20";
      if (number <= 30) return "ball-21-30";
      if (number <= 40) return "ball-31-40";
      return "ball-41-45";
    }

    function clearInputsOnly() {
      const inputs = document.querySelectorAll("input[type='number']");
      inputs.forEach(input => {
        input.value = "";
        input.classList.remove("border-green-500", "bg-green-50");
      });
      showCustomToast("입력 슬롯이 초기화되었습니다.");
    }

    function resetAll() {
      clearInputsOnly();
      document.getElementById("resultBox").innerHTML = `
        <div id="emptyState" class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200">
          <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="fa-solid fa-dice text-slate-300 text-3xl"></i>
          </div>
          <p class="text-sm text-slate-400 font-medium">제외할 번호를 지정한 뒤<br>'조합 생성하기' 버튼을 눌러주세요!</p>
        </div>
      `;
    }

    // 💥 핵심 기능: 고대비 흑백 전처리 필터 및 숫자 매칭 강화 알고리즘
    function preprocessImage(imgElement) {
      const canvas = document.getElementById("hiddenCanvas");
      const ctx = canvas.getContext("2d");
      
      canvas.width = imgElement.width;
      canvas.height = imgElement.height;
      ctx.drawImage(imgElement, 0, 0);
      
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      
      // 이미지 이진화 처리 (그림자를 없애고 텍스트 선명도를 극대화)
      for (let i = 0; i < data.length; i += 4) {
        const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
        // 문자와 배경의 경계 임계값을 보정하여 영수증 서체 인식률 향상
        const v = (brightness < 130) ? 0 : 255;
        data[i] = v;
        data[i+1] = v;
        data[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL();
    }

    async function processOcrWithFilter(inputElement) {
      const file = inputElement.files[0];
      if (!file) return;

      const overlay = document.getElementById("loadingOverlay");
      const titleText = document.getElementById("loadingTitle");
      const progressText = document.getElementById("ocrProgress");
      const progressBar = document.getElementById("ocrProgressBar");

      overlay.classList.remove("hidden");
      titleText.textContent = "이미지 보정 중...";
      progressText.textContent = "AI 최적화 전처리 필터를 적용하고 있습니다.";
      progressBar.style.width = "20%";

      const reader = new FileReader();
      reader.onload = async function(e) {
        const img = new Image();
        img.onload = async function() {
          // 보정 필터가 적용된 새 이미지 주소 획득
          const filteredSrc = preprocessImage(img);
          
          titleText.textContent = "AI 숫자 분석 중...";
          progressText.textContent = "보정된 데이터에서 번호를 추출하는 중...";
          progressBar.style.width = "40%";

          try {
            const result = await Tesseract.recognize(
              filteredSrc,
              'eng',
              {
                logger: m => {
                  if (m.status === 'recognizing text') {
                    const percent = Math.round(m.progress * 100);
                    progressText.textContent = `정밀 판독 진행률: ${percent}%`;
                    progressBar.style.width = `${40 + (percent * 0.55)}%`;
                  }
                }
              }
            );

            const text = result.data.text;
            
            // 로또 특유의 한 자리 공백 및 노이즈 문자를 깨끗이 정리하고 정수형 배열화
            const tokens = text.replace(/[^0-9\s]/g, ' ').split(/\s+/);
            let numArr = [];
            tokens.forEach(t => {
              const parsed = parseInt(t, 10);
              if (!isNaN(parsed) && parsed >= 1 && parsed <= 45) {
                numArr.push(parsed);
              }
            });

            // 중복 번호 완벽 제거
            const uniqueNumbers = [...new Set(numArr)];

            if (uniqueNumbers.length > 0) {
              const inputs = document.querySelectorAll("input[type='number']");
              inputs.forEach(input => {
                input.value = "";
                input.classList.remove("border-green-500", "bg-green-50");
              });

              const fillCount = Math.min(uniqueNumbers.length, 30);
              for (let i = 0; i < fillCount; i++) {
                inputs[i].value = uniqueNumbers[i];
                inputs[i].classList.add("border-green-500", "bg-green-50");
              }
              showCustomToast(`🎉 전처리 필터 분석으로 번호 ${fillCount}개를 자동 기입했습니다!`);
            } else {
              showCustomModal("인식 재시도 안내", "필터 보정 후에도 유효한 숫자가 발견되지 않았습니다. 좀 더 밝고 평평한 곳에서 흔들림 없이 정면으로 촬영해 주세요.");
            }
          } catch (err) {
            console.error(err);
            showCustomModal("오류", "데이터 처리 중 연산 지연이 발생했습니다. 다시 시도해 주세요.");
          } finally {
            overlay.classList.add("hidden");
            inputElement.value = "";
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function showCustomModal(title, text) {
      const modal = document.createElement("div");
      modal.className = "fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-6 z-50";
      modal.innerHTML = `
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 text-center shadow-2xl">
          <h3 class="font-bold text-lg text-slate-900 mb-2">${title}</h3>
          <p class="text-xs text-slate-500 leading-relaxed mb-4">${text}</p>
          <button onclick="this.parentElement.parentElement.remove()" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl hover:bg-indigo-700 transition-all">확인</button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function showCustomToast(message) {
      const toast = document.createElement("div");
      toast.className = "fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white text-[12px] font-semibold px-4 py-3 rounded-full shadow-lg z-50 flex items-center gap-1.5";
      toast.innerHTML = `<i class="fa-solid fa-circle-check text-green-400"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    async function generateLotto() {
      const inputs = document.querySelectorAll("input[type='number']");
      let excluded = [];

      inputs.forEach(input => {
        const val = parseInt(input.value);
        if (!isNaN(val) && val >= 1 && val <= 45) excluded.push(val);
      });

      excluded = [...new Set(excluded)];
      let pool = [];
      for (let i = 1; i <= 45; i++) {
        if (!excluded.includes(i)) pool.push(i);
      }

      const resultBox = document.getElementById("resultBox");
      resultBox.innerHTML = "";

      if (pool.length < 6) {
        resultBox.innerHTML = `
          <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl flex items-start gap-2">
            <i class="fa-solid fa-triangle-exclamation mt-1"></i>
            <div>
              <h5 class="font-bold text-sm">조합 불가</h5>
              <p class="text-xs text-red-600/90 mt-1">사용 가능한 번호(${pool.length}개)가 너무 적어 6개 숫자의 로또 조합을 구성할 수 없습니다.</p>
            </div>
          </div>
        `;
        return;
      }

      for (let g = 0; g < 5; g++) {
        let group = [];
        let poolCopy = [...pool];

        while (group.length < 6 && poolCopy.length > 0) {
          const idx = Math.floor(Math.random() * poolCopy.length);
          const num = poolCopy.splice(idx, 1)[0];
          if (!group.includes(num) && !isConsecutive(group, num)) {
            group.push(num);
          }
        }

        if (group.length < 6) {
          poolCopy = [...pool].filter(n => !group.includes(n));
          while (group.length < 6 && poolCopy.length > 0) {
            const idx = Math.floor(Math.random() * poolCopy.length);
            group.push(poolCopy.splice(idx, 1)[0]);
          }
        }

        group.sort((a, b) => a - b);

        const groupDiv = document.createElement("div");
        groupDiv.className = "bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between";

        const alphabet = ['A', 'B', 'C', 'D', 'E'];
        const labelSpan = document.createElement("span");
        labelSpan.className = "text-sm font-black text-slate-400 bg-slate-50 w-6 h-6 rounded-lg flex items-center justify-center border border-slate-100";
        labelSpan.textContent = alphabet[g];
        groupDiv.appendChild(labelSpan);

        const ballsContainer = document.createElement("div");
        ballsContainer.className = "flex gap-1.5";

        for (let i = 0; i < group.length; i++) {
          const ball = document.createElement("span");
          ball.className = `lotto-ball ${getBallColorClass(group[i])}`;
          ball.style.animationDelay = `${i * 0.12}s`;
          ball.textContent = group[i].toString().padStart(2, '0');
          ballsContainer.appendChild(ball);
        }

        groupDiv.appendChild(ballsContainer);
        resultBox.appendChild(groupDiv);
        await delay(450);
      }
    }

    function isConsecutive(group, number) {
      return group.some(n => Math.abs(n - number) === 1);
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
