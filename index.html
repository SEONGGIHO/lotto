<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>스마트 로또 조합기 PRO</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome (Premium Icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tesseract.js (AI OCR 엔진 - 이미지에서 숫자 추출용) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      /* tiiny.host 하단 워터마크 광고 배너에 생성 버튼과 결과가 완전히 가려지지 않도록 하단 대형 패딩 추가 */
      padding-bottom: 240px;
    }
    
    /* 실제 로또 번호대별 입체감 있는 공 색상 디자인 */
    .ball-1-10 { background: radial-gradient(circle at 30% 30%, #fef08a, #eab308); color: #1e293b; text-shadow: 0 1px 1px rgba(255,255,255,0.5); }
    .ball-11-20 { background: radial-gradient(circle at 30% 30%, #bfdbfe, #2563eb); color: #ffffff; }
    .ball-21-30 { background: radial-gradient(circle at 30% 30%, #fecaca, #dc2626); color: #ffffff; }
    .ball-31-40 { background: radial-gradient(circle at 30% 30%, #e2e8f0, #475569); color: #ffffff; }
    .ball-41-45 { background: radial-gradient(circle at 30% 30%, #bbf7d0, #16a34a); color: #ffffff; }

    /* 로또 공이 팡팡 튀어나오는 듯한 입체 애니메이션 */
    .lotto-ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-weight: 800;
      font-size: 17px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
      animation: ballPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: scale(0.3) rotate(-180deg);
    }
    @keyframes ballPop {
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- 앱 헤더 디자인 -->
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 px-4 sticky top-0 z-10 shadow-md">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-lg font-black tracking-tight flex items-center gap-2">
        <i class="fa-solid fa-dice-d20 text-yellow-300"></i>
        스마트 로또 조합기 PRO
      </h1>
      <button onclick="resetAll()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full transition-all">
        <i class="fa-solid fa-rotate-left"></i> 전체 초기화
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 mt-4">

    <!-- 제외 번호 관리 및 카메라 촬영 카드 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-sm font-bold text-slate-500 flex items-center gap-1.5">
          <i class="fa-solid fa-ban text-red-500"></i> 제외할 번호 입력 (6열 5행 격자)
        </h3>
        
        <!-- 모바일 기본 카메라를 연동하는 업로드 라벨 -->
        <label for="cameraInput" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 cursor-pointer transition-all border border-indigo-100 shadow-sm">
          <i class="fa-solid fa-camera"></i> 사진 찍어 자동 입력
        </label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="processOcr(this)">
      </div>

      <!-- 제외 번호 입력창 30개 (가로 6개 x 세로 5개 격자 구조 복원 완료) -->
      <div class="grid grid-cols-6 gap-2" id="inputGrid">
        <!-- 자바스크립트를 사용하여 안정적으로 격자 생성 및 전용 키패드 바인딩 -->
      </div>
      
      <div class="flex justify-between items-center mt-3">
        <p class="text-[11px] text-slate-400">
          * 번호를 직접 채우거나 <b>카메라 촬영</b> 버튼을 눌러보세요.
        </p>
        <button onclick="clearInputsOnly()" class="text-[11px] font-bold text-indigo-600 hover:underline">
          입력창만 비우기
        </button>
      </div>
    </div>

    <!-- 로또 번호 조합 생성 버튼 실행 영역 -->
    <div class="text-center my-4">
      <button onclick="generateLotto()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-3.5 px-6 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <i class="fa-solid fa-wand-magic-sparkles"></i> 대박 기원 조합 생성하기
      </button>
    </div>

    <!-- 결과창 영역 -->
    <div id="resultBox" class="space-y-3">
      <!-- 생성 전 기본 웰컴 카드 디자인 -->
      <div id="emptyState" class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200">
        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fa-solid fa-dice text-slate-300 text-3xl"></i>
        </div>
        <p class="text-sm text-slate-400 font-medium">제외할 번호를 지정한 뒤<br>'조합 생성하기' 버튼을 눌러주세요!</p>
      </div>
    </div>

  </main>

  <!-- AI 이미지 분석 중 화면을 가리는 로딩 레이어 -->
  <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-xs z-50 flex flex-col items-center justify-center text-white px-6 text-center">
    <div class="bg-white text-slate-800 p-6 rounded-3xl shadow-2xl max-w-xs w-full flex flex-col items-center">
      <!-- 로딩 인디케이터 스피너 -->
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
      <h4 class="font-bold text-lg text-slate-900 mb-1">사진 번호 분석 중...</h4>
      <p class="text-xs text-slate-500 mb-4 leading-relaxed" id="ocrProgress">인공지능이 이미지에서 1~45 사이의 숫자를 추출하고 있습니다. 잠시만 기다려주세요.</p>
      <div class="w-full bg-slate-100 rounded-full h-2">
        <div id="ocrProgressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById("inputGrid");
    
    // 모바일 터치 및 입력에 쾌적하도록 6열 5행(30개) 격자를 동적 렌더링
    for (let i = 0; i < 30; i++) {
      const input = document.createElement("input");
      input.type = "number";
      input.inputMode = "numeric"; // 모바일에서 전용 숫자 가상 키보드가 바로 활성화됨
      input.min = 1;
      input.max = 45;
      input.placeholder = "-";
      // 컴팩트하고 유려한 인풋 창 테두리 스타일링 지정
      input.className = "w-full text-center py-2.5 font-bold text-slate-700 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all";
      grid.appendChild(input);
    }

    // 실제 나눔 로또 공식 구색에 맞춘 공 클래스 부여 반환 함수
    function getBallColorClass(number) {
      if (number <= 10) return "ball-1-10";
      if (number <= 20) return "ball-11-20";
      if (number <= 30) return "ball-21-30";
      if (number <= 40) return "ball-31-40";
      return "ball-41-45";
    }

    // 제외할 인풋 박스 값들만 빠르게 초기화
    function clearInputsOnly() {
      const inputs = document.querySelectorAll("input[type='number']");
      inputs.forEach(input => {
        input.value = "";
        input.classList.remove("border-green-500", "bg-green-50");
      });
      showCustomToast("입력창이 모두 초기화되었습니다.");
    }

    // 앱 전체 데이터 완벽 리셋
    function resetAll() {
      clearInputsOnly();
      const resultBox = document.getElementById("resultBox");
      resultBox.innerHTML = `
        <div id="emptyState" class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200">
          <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="fa-solid fa-dice text-slate-300 text-3xl"></i>
          </div>
          <p class="text-sm text-slate-400 font-medium">제외할 번호를 지정한 뒤<br>'조합 생성하기' 버튼을 눌러주세요!</p>
        </div>
      `;
    }

    // 모바일 카메라 및 AI OCR 문자 인식 비동기 구동기
    async function processOcr(inputElement) {
      const file = inputElement.files[0];
      if (!file) return;

      const overlay = document.getElementById("loadingOverlay");
      const progressText = document.getElementById("ocrProgress");
      const progressBar = document.getElementById("ocrProgressBar");

      // 진행 팝업 개방
      overlay.classList.remove("hidden");
      progressText.textContent = "촬영한 이미지 업로드 준비 중...";
      progressBar.style.width = "15%";

      try {
        progressText.textContent = "숫자 검출 모듈 구동 중...";
        progressBar.style.width = "35%";

        // Tesseract.js 엔진 가동 및 다국어 리터럴 로더 초기화
        const result = await Tesseract.recognize(
          file,
          'eng', // 숫자 인식율을 최대한 높이기 위해 범용 영문 트레이닝 모델 선택
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                const percent = Math.round(m.progress * 100);
                progressText.textContent = `글자 분석 및 판독률: ${percent}%`;
                progressBar.style.width = `${35 + (percent * 0.55)}%`;
              }
            }
          }
        );

        progressBar.style.width = "95%";
        progressText.textContent = "감지된 번호 필터링 정렬 작업 중...";

        const recognizedText = result.data.text;
        
        // 정규식을 사용해서 촬영된 이미지 내의 1부터 45 사이 숫자(로또 유효 번호)만 쏙 추출
        const allNumbers = recognizedText.match(/\b([1-9]|[1-3][0-9]|4[0-5])\b/g);
        
        if (allNumbers && allNumbers.length > 0) {
          // 중복으로 감지된 동일 숫자들 정리
          const uniqueNumbers = [...new Set(allNumbers.map(Number))];
          
          // 기존 입력창 값 말끔히 비우기
          const inputs = document.querySelectorAll("input[type='number']");
          inputs.forEach(input => {
            input.value = "";
            input.classList.remove("border-green-500", "bg-green-50");
          });

          // 한정 공간(30개 슬롯) 내에 인식된 숫자들을 순차 자동 기입
          const fillCount = Math.min(uniqueNumbers.length, 30);
          for (let i = 0; i < fillCount; i++) {
            inputs[i].value = uniqueNumbers[i];
            
            // 시각적 피드백 효과를 위해 입력 필드를 임시 연초록색으로 활성 표시
            inputs[i].classList.add("border-green-500", "bg-green-50");
          }

          showCustomToast(`🎉 로또 용지 이미지에서 총 ${fillCount}개의 번호를 검출해 입력했습니다!`);
        } else {
          showCustomModal("인식 실패 알림", "촬영된 사진에서 로또 번호로 인식할 만한 숫자를 발견하지 못했습니다. 글씨가 선명하게 찍히도록 정면에서 가깝게 다시 한 번 촬영해 주세요.");
        }

      } catch (error) {
        console.error(error);
        showCustomModal("인식 실패 알림", "이미지 판독 중 일시적인 서버 지연 또는 하드웨어 자원 제한 오류가 발생했습니다. 다시 촬영해 주세요.");
      } finally {
        // 프로세스 완료 후 화면 해제 및 인풋 파일 버퍼 소거
        overlay.classList.add("hidden");
        inputElement.value = "";
      }
    }

    // 브라우저 기본 Alert 모달을 완전히 우회하는 우아한 알림 다이얼로그
    function showCustomModal(title, text) {
      const modal = document.createElement("div");
      modal.className = "fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-6 z-50 animate-fade-in";
      modal.innerHTML = `
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 text-center shadow-2xl border border-slate-100">
          <h3 class="font-bold text-lg text-slate-900 mb-2">${title}</h3>
          <p class="text-xs text-slate-500 leading-relaxed mb-4">${text}</p>
          <button onclick="this.parentElement.parentElement.remove()" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl hover:bg-indigo-700 active:scale-95 transition-all">닫기</button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    // 화면 하단에 둥둥 뜨는 컴팩트 모던 알림 토스트
    function showCustomToast(message) {
      const toast = document.createElement("div");
      toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white text-[12px] font-semibold px-4 py-3 rounded-full shadow-lg z-50 flex items-center gap-1.5 animate-bounce";
      toast.innerHTML = `<i class="fa-solid fa-circle-check text-green-400"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    // 로또 조합 최종 연산 처리
    async function generateLotto() {
      const inputs = document.querySelectorAll("input[type='number']");
      let excluded = [];

      inputs.forEach(input => {
        const val = parseInt(input.value);
        if (!isNaN(val) && val >= 1 && val <= 45) {
          excluded.push(val);
        }
      });

      excluded = [...new Set(excluded)];
      
      // 45개 번호 풀 중에서 중복을 배제한 완벽한 보정 풀(Pool) 세팅
      let pool = [];
      for (let i = 1; i <= 45; i++) {
        if (!excluded.includes(i)) pool.push(i);
      }

      const resultBox = document.getElementById("resultBox");
      resultBox.innerHTML = "";

      // 사용자가 지정한 제외수가 과도하게 많을 때에 대한 인터셉트 예외처리
      if (pool.length < 6) {
        resultBox.innerHTML = `
          <div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl flex items-start gap-2 animate-pulse">
            <i class="fa-solid fa-triangle-exclamation mt-1"></i>
            <div>
              <h5 class="font-bold text-sm">조합 불가 경고</h5>
              <p class="text-xs text-red-600/90 mt-1 leading-relaxed">제외된 번호가 지나치게 많습니다. 남은 사용 가능한 번호(${pool.length}개)로는 한 세트의 완벽한 6개 번호 조합을 도출할 수 없습니다. 제외 번호 몇 개를 비워주세요.</p>
            </div>
          </div>
        `;
        return;
      }

      // 5개 완성 라인 생성
      for (let g = 0; g < 5; g++) {
        let group = [];
        let poolCopy = [...pool];

        while (group.length < 6 && poolCopy.length > 0) {
          const idx = Math.floor(Math.random() * poolCopy.length);
          const num = poolCopy.splice(idx, 1)[0];
          
          // 번호 간 연번 방지 및 적정 난수 배정
          if (!group.includes(num) && !isConsecutive(group, num)) {
            group.push(num);
          }
        }

        // 혹여나 지나친 연번 조건으로 인해 루프상 6개가 부합되지 않을 시 차선책 강제 충전
        if (group.length < 6) {
          poolCopy = [...pool].filter(n => !group.includes(n));
          while (group.length < 6 && poolCopy.length > 0) {
            const idx = Math.floor(Math.random() * poolCopy.length);
            group.push(poolCopy.splice(idx, 1)[0]);
          }
        }

        // 오름차순 깔끔한 정렬
        group.sort((a, b) => a - b);

        // 출력 행 구조 생성
        const groupDiv = document.createElement("div");
        groupDiv.className = "bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between";

        const alphabet = ['A', 'B', 'C', 'D', 'E'];
        const labelSpan = document.createElement("span");
        labelSpan.className = "text-sm font-black text-slate-400 bg-slate-50 w-6 h-6 rounded-lg flex items-center justify-center border border-slate-100 shadow-3xs";
        labelSpan.textContent = alphabet[g];
        groupDiv.appendChild(labelSpan);

        const ballsContainer = document.createElement("div");
        ballsContainer.className = "flex gap-1.5";

        for (let i = 0; i < group.length; i++) {
          const ball = document.createElement("span");
          const colorClass = getBallColorClass(group[i]);
          ball.className = `lotto-ball ${colorClass}`;
          // 각 로또 구형이 물 흐르듯 연달아 사르르 튕겨 나오도록 딜레이 적용
          ball.style.animationDelay = `${i * 0.12}s`;
          ball.textContent = group[i].toString().padStart(2, '0');
          ballsContainer.appendChild(ball);
        }

        groupDiv.appendChild(ballsContainer);
        resultBox.appendChild(groupDiv);

        // 시각적 체감을 높이기 위해 각 라인 출력 사이에 아주 짧은 비동기 텀 부여
        await delay(450);
      }
    }

    // 연속된 번호 판별 연산자
    function isConsecutive(group, number) {
      return group.some(n => Math.abs(n - number) === 1);
    }

    // 비동기 딜레이 구현체
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
